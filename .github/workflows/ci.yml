name: CI Pipeline - Calculadora Appium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restaurar dependencias
      run: dotnet restore CalculadoraAppiumTests.csproj

    - name: Compilar proyecto
      run: dotnet build CalculadoraAppiumTests.csproj --configuration Release --no-restore

    - name: Build exitoso
      run: echo "✅ Proyecto compilado correctamente"
